name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which part of the extension would change?
      multiple: true
      options:
        - Markdown viewer
        - Markdown editor
        - Mermaid rendering
        - Code blocks
        - Tables
        - Notes sidebar
        - Themes
        - Exports (PDF / DOCX / TXT)
        - MCP server
        - Commands / context menus
        - Settings / configuration
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, similar implementations in other tools, or any other context.
