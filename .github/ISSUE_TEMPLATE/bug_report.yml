name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill out the form below.

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: From VSCode → Extensions → Mark It Down → Details
      placeholder: "e.g., 0.1.0"
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VSCode Version
      description: Help → About in VSCode (or `code --version` first line)
      placeholder: "e.g., 1.96.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15.2 (Apple Silicon), Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where does the bug happen?
      multiple: true
      options:
        - Markdown viewer (rendering)
        - Markdown editor (typing / saving)
        - Mode toggle (view ↔ edit)
        - Mermaid diagram rendering
        - Code block (copy / export image)
        - Tables (sort / export Excel/CSV)
        - Notes sidebar
        - Theme switching
        - Export to PDF / DOCX / TXT
        - MCP server integration
        - Settings / configuration
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1. Open a markdown file with `…`
        2. Click on `…`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: sample-md
    attributes:
      label: Sample markdown that triggers the bug
      description: Paste a minimal `.md` snippet that reproduces the issue.
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Output from VSCode's Developer Tools (Help → Toggle Developer Tools → Console), screenshots, or stack traces.
