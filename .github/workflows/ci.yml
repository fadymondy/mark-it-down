name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + compile (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: i18n parity check
        run: node scripts/check-i18n.mjs
      - name: Unit tests
        run: npm test
      - name: Coverage report
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage -- --coverage.thresholds.statements=0
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 14
      - name: Compile extension + webview + MCP server
        run: npm run compile
      - name: Compile Electron app
        run: npm run compile:electron
      - name: Build Claude plugin bundle
        run: npm run build:claude-plugin

  integration:
    name: VSCode integration tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Compile extension
        run: npm run compile
      - name: Compile integration tests
        run: npm run compile:integration
      - name: Run integration tests under xvfb
        run: xvfb-run -a node out/integration/runTest.js
        env:
          MID_DEV: '0'
