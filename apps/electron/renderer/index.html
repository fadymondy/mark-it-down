<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self';" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mark It Down</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="icons.css" />
<link rel="stylesheet" href="primitives.css" />
<link rel="stylesheet" href="renderer.css" />
</head>
<body>
<header class="mid-titlebar" role="toolbar">
  <div class="mid-titlebar-left">
    <button id="open-folder-btn" class="mid-btn" title="Open folder (Cmd/Ctrl+Shift+O)" data-icon="folder-open" data-label="Folder"></button>
    <button id="open-btn" class="mid-btn" title="Open file (Cmd/Ctrl+O)" data-icon="file" data-label="Open"></button>
    <button id="save-btn" class="mid-btn" title="Save (Cmd/Ctrl+S)" data-icon="save" data-label="Save"></button>
  </div>
  <div class="mid-titlebar-center">
    <span id="filename" class="mid-filename">Untitled</span>
  </div>
  <div class="mid-titlebar-right">
    <button id="mode-view" class="mid-btn" title="View" data-icon="show" data-label="View"></button>
    <button id="mode-split" class="mid-btn is-active" title="Split (default)" data-icon="columns" data-label="Split"></button>
    <button id="mode-edit" class="mid-btn" title="Edit" data-icon="edit" data-label="Edit"></button>
  </div>
</header>
<div class="mid-shell">
  <aside class="mid-sidebar" id="sidebar" hidden>
    <div class="mid-sidebar-header">
      <span class="mid-sidebar-title" id="sidebar-folder-name">Files</span>
      <button id="sidebar-refresh" class="mid-btn mid-btn--icon mid-btn--ghost" title="Refresh" data-icon="refresh"></button>
    </div>
    <div class="mid-sidebar-tree" id="tree-root"></div>
  </aside>
  <main id="root" class="viewing">
    <div class="empty-state">
      <h1>Mark It Down</h1>
      <p>Open a folder with <kbd class="mid-kbd">Cmd/Ctrl+Shift+O</kbd> to browse, or open a single file with <kbd class="mid-kbd">Cmd/Ctrl+O</kbd>.</p>
    </div>
  </main>
</div>
<script src="renderer.js"></script>
</body>
</html>
