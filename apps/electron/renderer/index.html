<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self';" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mark It Down</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="icons.css" />
<link rel="stylesheet" href="primitives.css" />
<link rel="stylesheet" href="katex.css" />
<link rel="stylesheet" href="renderer.css" />
</head>
<body>
<div id="mid-loader" class="mid-loader" aria-hidden="true">
  <div class="mid-loader-glyph"></div>
  <div class="mid-loader-label">Mark It Down</div>
</div>
<dialog id="mid-pin-editor" class="mid-pin-editor">
  <form method="dialog" class="mid-pin-form">
    <h3 class="mid-pin-title">Pin folder</h3>
    <label class="mid-pin-label">Title<input type="text" id="mid-pin-name" class="mid-settings-control" /></label>
    <div class="mid-pin-label">Icon</div>
    <div class="mid-pin-icons" id="mid-pin-icons"></div>
    <div class="mid-pin-label">Color</div>
    <div class="mid-pin-colors" id="mid-pin-colors"></div>
    <div class="mid-pin-actions">
      <button type="button" id="mid-pin-cancel" class="mid-btn">Cancel</button>
      <button type="submit" id="mid-pin-save" class="mid-btn mid-btn--primary">Save</button>
    </div>
  </form>
</dialog>
<header class="mid-titlebar" role="toolbar">
  <div class="mid-titlebar-left">
    <button id="open-folder-btn" class="mid-btn mid-btn--icon mid-btn--ghost" title="Open folder (Cmd/Ctrl+Shift+O)" data-icon="folder-open"></button>
    <button id="open-btn" class="mid-btn mid-btn--icon mid-btn--ghost" title="Open file (Cmd/Ctrl+O)" data-icon="file"></button>
    <button id="save-btn" class="mid-btn mid-btn--icon mid-btn--ghost" title="Save (Cmd/Ctrl+S)" data-icon="save"></button>
  </div>
  <div class="mid-titlebar-center">
    <button id="titlebar-search" class="mid-titlebar-search" title="Search (Cmd/Ctrl+K)">
      <span class="mid-titlebar-search-icon" data-icon="search"></span>
      <span id="filename" class="mid-filename">Untitled</span>
      <span class="mid-titlebar-search-kbd"><kbd class="mid-kbd">⌘K</kbd></span>
    </button>
  </div>
  <div class="mid-titlebar-right">
    <div class="mid-mode-toggle" role="tablist" aria-label="Render mode">
      <button id="mode-view" class="mid-mode-seg is-active" title="View (default)" data-icon="show"></button>
      <button id="mode-split" class="mid-mode-seg" title="Split" data-icon="columns"></button>
      <button id="mode-edit" class="mid-mode-seg" title="Edit" data-icon="edit"></button>
    </div>
    <button id="settings-btn" class="mid-btn mid-btn--icon mid-btn--ghost" title="Settings (Cmd/Ctrl+,)" data-icon="cog"></button>
  </div>
</header>
<section class="mid-settings-page" id="settings-page" hidden aria-label="Settings">
  <header class="mid-settings-page-topbar">
    <button id="settings-back" class="mid-btn mid-btn--icon mid-btn--ghost mid-settings-back" title="Back (Esc)" data-icon="x"></button>
    <div class="mid-settings-page-crumbs" id="settings-crumbs">
      <span class="mid-settings-page-crumb mid-settings-page-crumb--root">Settings</span>
      <span class="mid-settings-page-crumb-sep" aria-hidden="true">/</span>
      <span class="mid-settings-page-crumb-active" id="settings-crumb-active">General</span>
    </div>
  </header>
  <div class="mid-settings-page-body">
    <aside class="mid-settings-nav" id="settings-nav" aria-label="Settings categories">
      <div class="mid-settings-nav__header">
        <h2 class="mid-settings-nav__title">Settings</h2>
        <p class="mid-settings-nav__subtitle">Customize your workspace</p>
      </div>
      <nav class="mid-settings-nav__list" id="settings-nav-list" role="tablist" aria-orientation="vertical"></nav>
    </aside>
    <main class="mid-settings-main" id="settings-main" tabindex="-1"></main>
  </div>
</section>
<div class="mid-shell">
  <nav class="mid-activity-bar" id="activity-bar" aria-label="Activity bar">
    <button id="activity-files" class="mid-activity-btn is-active" title="Files (toggle)" data-icon="folder"></button>
    <button id="activity-notes" class="mid-activity-btn" title="Notes (toggle)" data-icon="bookmark"></button>
    <div id="activity-pinned" class="mid-activity-pinned"></div>
    <span class="mid-activity-spacer"></span>
    <button id="activity-settings" class="mid-activity-btn" title="Settings (Cmd/Ctrl+,)" data-icon="cog"></button>
  </nav>
  <dialog id="mid-spotlight" class="mid-spotlight">
    <div class="mid-spotlight-frame">
      <div class="mid-spotlight-tabs">
        <button class="mid-spotlight-tab is-active" data-spotlight-scope="workspace">Workspace</button>
        <button class="mid-spotlight-tab" data-spotlight-scope="file">Current file</button>
      </div>
      <input id="mid-spotlight-input" class="mid-spotlight-input" type="text" placeholder="Type to search…" autocomplete="off" />
      <div id="mid-spotlight-results" class="mid-spotlight-results"></div>
      <div id="mid-spotlight-footer" class="mid-spotlight-footer">
        <span class="mid-spotlight-hint"><kbd class="mid-spotlight-kbd">↑↓</kbd> navigate</span>
        <span class="mid-spotlight-hint"><kbd class="mid-spotlight-kbd">Enter</kbd> open</span>
        <span class="mid-spotlight-hint"><kbd class="mid-spotlight-kbd">Tab</kbd> switch scope</span>
        <span class="mid-spotlight-hint"><kbd class="mid-spotlight-kbd">Esc</kbd> close</span>
      </div>
    </div>
  </dialog>
  <aside class="mid-sidebar" id="sidebar" hidden>
    <div class="mid-sidebar-header" id="sidebar-files-header">
      <button id="workspace-switcher" class="mid-workspace-switcher" title="Switch workspace">
        <span id="sidebar-folder-name" class="mid-sidebar-title">Files</span>
        <span class="mid-workspace-chevron" data-icon="chevron-right"></span>
      </button>
      <button id="sidebar-refresh" class="mid-btn mid-btn--icon mid-btn--ghost" title="Refresh" data-icon="refresh"></button>
    </div>
    <div class="mid-sidebar-header" id="sidebar-notes-header" hidden>
      <input id="notes-filter" class="mid-table-filter" type="search" placeholder="Filter notes…" />
      <button id="notes-new" class="mid-btn mid-btn--icon mid-btn--ghost" title="New note (Cmd/Ctrl+N)" data-icon="plus"></button>
    </div>
    <div class="mid-sidebar-tree" id="tree-root"></div>
    <div class="mid-notes-list" id="notes-list" hidden></div>
  </aside>
  <main id="root" class="viewing"></main>
  <aside class="mid-outline" id="outline-rail" aria-label="Document outline" hidden>
    <header class="mid-outline-header">
      <span class="mid-outline-title">Outline</span>
      <button id="outline-close" class="mid-btn mid-btn--icon mid-btn--ghost" title="Hide outline" data-icon="x"></button>
    </header>
    <nav id="outline-list" class="mid-outline-list" aria-label="Headings"></nav>
  </aside>
</div>
<footer class="mid-statusbar" id="statusbar">
  <button class="mid-status-cell mid-status-cell--button" id="status-repo" title="Click to connect / sync">
    <span class="mid-icon mid-icon--sm" id="status-repo-icon"></span>
    <span id="status-repo-text">No repo</span>
  </button>
  <span class="mid-status-spacer"></span>
  <span class="mid-status-cell" id="status-cursor" hidden>L1:C1</span>
  <span class="mid-status-cell" id="status-words">0 words</span>
  <button class="mid-status-cell mid-status-cell--button" id="status-outline" title="Toggle outline (Cmd/Ctrl+Shift+L)">
    <span class="mid-icon mid-icon--sm" data-icon="list-ul"></span>
    <span id="status-outline-text">Outline</span>
  </button>
  <span class="mid-status-cell mid-status-dot" id="status-save" title="Saved">●</span>
</footer>
<dialog id="mid-mermaid-editor" class="mid-mermaid-editor">
  <header class="mid-mermaid-editor-header">
    <h3 class="mid-mermaid-editor-title">Edit diagram</h3>
    <button id="mid-mermaid-editor-close" class="mid-btn mid-btn--icon mid-btn--ghost" data-icon="x" title="Cancel"></button>
  </header>
  <div class="mid-mermaid-editor-body">
    <textarea id="mid-mermaid-editor-src" class="mid-mermaid-editor-src" spellcheck="false"></textarea>
    <div id="mid-mermaid-editor-preview" class="mid-mermaid-editor-preview"></div>
  </div>
  <footer class="mid-mermaid-editor-footer">
    <span class="mid-mermaid-editor-hint">⌘↵ to save · Esc to cancel</span>
    <span style="flex:1"></span>
    <button id="mid-mermaid-editor-cancel" class="mid-btn">Cancel</button>
    <button id="mid-mermaid-editor-save" class="mid-btn mid-btn--primary">Save</button>
  </footer>
</dialog>
<dialog id="mid-warehouse-onboarding" class="mid-onboarding" aria-labelledby="mid-onboarding-title">
  <div class="mid-onboarding-frame">
    <header class="mid-onboarding-header">
      <h2 class="mid-onboarding-title" id="mid-onboarding-title">Set up your notes warehouse</h2>
      <button id="mid-onboarding-close" class="mid-btn mid-btn--icon mid-btn--ghost" title="Skip" data-icon="x"></button>
    </header>
    <ol class="mid-onboarding-steps" id="mid-onboarding-steps">
      <li class="is-active" data-step="gh">1 &middot; GitHub CLI</li>
      <li data-step="auth">2 &middot; Sign in</li>
      <li data-step="repo">3 &middot; Pick a repo</li>
    </ol>
    <div class="mid-onboarding-body" id="mid-onboarding-body"></div>
    <footer class="mid-onboarding-footer">
      <button id="mid-onboarding-skip" class="mid-btn">Skip</button>
      <span style="flex:1"></span>
      <button id="mid-onboarding-back" class="mid-btn" hidden>Back</button>
      <button id="mid-onboarding-next" class="mid-btn mid-btn--primary" hidden>Next</button>
    </footer>
  </div>
</dialog>
<dialog id="mid-dialog" class="mid-dialog">
  <form method="dialog" class="mid-dialog-form">
    <h3 class="mid-dialog-title" id="mid-dialog-title"></h3>
    <p class="mid-dialog-message" id="mid-dialog-message" hidden></p>
    <label class="mid-dialog-label" id="mid-dialog-label" hidden>
      <span id="mid-dialog-label-text"></span>
      <input type="text" id="mid-dialog-input" class="mid-settings-control" />
    </label>
    <div class="mid-dialog-actions">
      <button type="button" id="mid-dialog-cancel" class="mid-btn">Cancel</button>
      <button type="submit" id="mid-dialog-ok" class="mid-btn mid-btn--primary">OK</button>
    </div>
  </form>
</dialog>
<script src="renderer.js"></script>
</body>
</html>
